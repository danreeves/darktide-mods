name: Release

on:
  push:
    branches: [main]

jobs:
  check-mods:
    name: Check .mod versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: butr/actions-common-setup@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 zip

      - name: Install BUTR.NexusUploader
        run: dotnet tool install -g BUTR.NexusUploader

      - name: Verify CLI tools
        run: |
          if ! command -v lua5.3 &> /dev/null; then
            echo "lua5.3 not found"
            exit 1
          fi
          if ! command -v zip &> /dev/null; then
            echo "zip not found"
            exit 1
          fi
          if ! command -v unex &> /dev/null; then
            echo "unex not found"
            exit 1
          fi
          echo "All CLI tools are available"

      - name: Run mod check and upload
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          UNEX_GAME: warhammer40kdarktide
          UNEX_APIKEY: ${{ secrets.NEXUSMODS_APIKEY }}
          UNEX_SESSION_COOKIE: ${{ secrets.NEXUSMODS_SESSION_COOKIE }}
        run: |
          lua5.3 scripts/ci/publish_mods.lua
