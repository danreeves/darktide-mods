name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Upload changed mods to Nexus Mods
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Upload changed mods
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
        run: node scripts/ci/publish_mods.js
